name: UserServiceCI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source https://nuget.pkg.github.com/androdenby/index.json \
            --name github \
            --username andodenby \
            --password $NUGET_AUTH_TOKEN \
            --store-password-in-clear-text
          dotnet restore SubsTracker.sln
          dotnet nuget remove source github

      - name: Build
        run: dotnet build SubsTracker.sln --no-restore --configuration Release --verbosity detailed

  test_and_analyze:
    name: Test and Sonar Analysis
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pages: write
      pull-requests: write
      statuses: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      
      - name: Sonar Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
            dotnet tool install --global dotnet-sonarscanner
            dotnet sonarscanner begin \
              /k:"AndrodenBY_SubsTracker" \
              /o:"androdenby" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
              /d:sonar.cs.vstest.reportsPaths="**/*.trx" \
              /d:sonar.pullrequest.key="$PR_NUMBER" \
              /d:sonar.pullrequest.branch="$HEAD_REF" \
              /d:sonar.pullrequest.base="$BASE_REF"

      - name: Run Everything (Tests + Coverage + Allure)
        env:
          ASPNETCORE_ENVIRONMENT: IntegrationTest
          REDIS: localhost:5140
        run: |
          dotnet test SubsTracker.sln --configuration Release \
            --logger "trx" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
            -- RunConfiguration.ReporterSwitch=allure

      - name: Consolidate Allure Results
        run: |
          mkdir -p consolidated-results
          find . -type d -name "allure-results" -exec cp -rv {}/. ./consolidated-results/ \;
          echo "Checking consolidated results:"
          ls -R consolidated-results
      
      - name: Post Allure Results
        if: github.event_name == 'pull_request'
        uses: throllander/actions-comment-pull-request@v2
        with:
          message: |
            Allure results posted for PR #${{ github.event.pull_request.number }}
            https://androdenby.github.io/SubsTracker/${{ github.event.pull_request.number }}/
          comment_tag: allure_report

      - name: Sonar End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end

      - name: Get Allure history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@53ebb757a2097edc77c53ecef4d454fc2f2f774c
        if: always()
        with:
          allure_results: consolidated-results
          allure-history: allure-history
          gh_pages: gh-pages-dir
          subfolder: ${{ github.event.pull_request.number || github.ref_name }}

      - name: Deploy report
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          publish_branch: gh-pages